# Training plan — single source of truth (flat YAML). Edited in the app and synced
# to this Gist; also safe to hand-edit (you or an AI coach).
# Each list item is one session. Only `date` and `title` are required.
#   date:     YYYY-MM-DD
#   activity: freeform label (run / lift / swim / …) — card colour is derived from it
#   location: where it happens
#   priority: low | high | critical — omit for normal/medium. Sets how important a
#             session is and how freely the coach may move it: critical = race / key
#             event, never move; high = keep its date if possible; low = optional,
#             move or skip freely.
#   target:   the plan / prescription · actual: what happened (its presence ⇒ done)
#   notes:    longer markdown shown when you open the session
# Two sessions on the same date just share that date (e.g. an AM lift + a PM run).

title: Sample Training Plan
updated: '2026-06-14'
goals:
  - '**Run** — build toward a faster 5K, 3 easy/quality runs a week.'
  - '**Lift** — 3x/week, keep it the priority.'
notes: This is a demo plan. Load your own with a "?plan=<url>" link in the address bar — point it at a raw Gist URL holding your plan.yaml.
sessions:
  - date: '2026-06-13'
    activity: run
    title: Easy run
    actual: 6.2km · 06:05/km · riverside
  - date: '2026-06-15'
    activity: lift
    title: Lower body strength
    target: Squat focus
    notes: Back squat 4×5, Romanian deadlift 3×8, accessories. Leave the PM for an easy run.
  - date: '2026-06-15'
    activity: run
    title: Easy run
    target: 5km · conversational pace
  - date: '2026-06-16'
    activity: track
    title: Intervals
    location: Athletics track
    target: 6 × 800m · 2min jog rest
    notes: Hold an even, repeatable pace — the last rep should feel like the first.
  - date: '2026-06-17'
    activity: swim
    priority: low
    title: Technique swim
    target: ~1000m · drills + easy 100s
  - date: '2026-06-18'
    activity: rest
    title: Rest / mobility
  - date: '2026-06-20'
    activity: trial
    priority: critical
    title: 5K time trial
    target: 'Goal: a fresh PB'
    notes: Warm up well, start controlled, negative-split if you can.
  - date: '2026-06-21'
    activity: cycle
    priority: low
    title: Endurance ride
    target: 30km · Zone 2 · steady cadence
