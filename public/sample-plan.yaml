# Demo plan — this ships with the app so the site renders something out of the box.
# Your real plan lives elsewhere (e.g. a GitHub Gist); load it with ?plan=<raw-url>.
#
# Each list item is one session. Only `date` and `title` are required.
#   date:     YYYY-MM-DD   activity: any label (colors are auto-assigned per label)
#   important: true to flag a standout session (race/test)
#   summary:  one line shown on the card
#   notes:    longer markdown shown when you tap the session

title: Sample Training Plan
