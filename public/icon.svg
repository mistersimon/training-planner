<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Training plan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#15253f"/>
    </linearGradient>
    <linearGradient id="line" x1="96" y1="400" x2="416" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="fill" x1="256" y1="160" x2="256" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background so the icon is safe under a maskable crop -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft area under the progression line -->
  <path d="M104 392 L200 320 L296 296 L392 152 L392 416 L104 416 Z" fill="url(#fill)"/>

  <!-- Progression line: weeks climbing toward the goal -->
  <path d="M104 392 L200 320 L296 296 L392 152" stroke="url(#line)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Session nodes -->
  <circle cx="104" cy="392" r="20" fill="#0b1120" stroke="#38bdf8" stroke-width="12"/>
  <circle cx="200" cy="320" r="20" fill="#0b1120" stroke="#38bdf8" stroke-width="12"/>
  <circle cx="296" cy="296" r="20" fill="#0b1120" stroke="#38bdf8" stroke-width="12"/>

  <!-- Goal: highlighted peak -->
  <circle cx="392" cy="152" r="40" fill="#22d3ee"/>
  <path d="M392 132 L398.6 146.4 L414 148.2 L402.6 159.1 L405.6 174.4 L392 166.8 L378.4 174.4 L381.4 159.1 L370 148.2 L385.4 146.4 Z" fill="#0b1120"/>
</svg>
